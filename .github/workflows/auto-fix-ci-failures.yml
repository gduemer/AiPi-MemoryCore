name: Auto-Fix CI Failures

# Trigger on CI workflow completion (after lint/test runs)
on:
  workflow_run:
    workflows: ["CI — Build, Lint, Test"]
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-fix-on-failure:
    # Only run if CI failed and this is a PR
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.workflow_run?.pull_requests?.[0]?.number;
            if (!prNumber) {
              core.setFailed('No PR found for this workflow run');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Get recursion depth from PR branch name or recent commit messages
            let depth = 0;

            // Check branch name first
            const branchMatch = pr.head.ref.match(/auto-fix-depth-(\d+)/);
            if (branchMatch) {
              depth = parseInt(branchMatch[1]);
            } else {
              // Check recent commits for depth markers
              const { data: commits } = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 10
              });

              // Look through commit messages for depth markers
              for (const commit of commits.reverse()) {
                const match = commit.commit.message.match(/\[auto-fix-depth-(\d+)\]/);
                if (match) {
                  depth = parseInt(match[1]);
                  break;
                }
              }
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_branch', pr.head.ref);
            core.setOutput('base_branch', pr.base.ref);
            core.setOutput('depth', depth);

            return { prNumber, depth };

      - name: Check recursion depth and determine strategy
        id: check_depth
        run: |
          DEPTH=${{ steps.pr.outputs.depth }}
          echo "Current depth: $DEPTH"

          if [ "$DEPTH" -ge 2 ]; then
            echo "reached_max_depth=true" >> $GITHUB_OUTPUT
            echo "strategy=request_owner_input" >> $GITHUB_OUTPUT
            echo "⚠️ Maximum fix attempts (2) reached. Requesting owner input."
          elif [ "$DEPTH" -eq 1 ]; then
            echo "reached_max_depth=false" >> $GITHUB_OUTPUT
            echo "strategy=deep_fix" >> $GITHUB_OUTPUT
            echo "🔧 Attempt 2/2: Running deeper fix strategy..."
          else
            echo "reached_max_depth=false" >> $GITHUB_OUTPUT
            echo "strategy=quick_fix" >> $GITHUB_OUTPUT
            echo "🔧 Attempt 1/2: Running quick fix strategy..."
          fi

      - name: Checkout PR branch
        if: steps.check_depth.outputs.reached_max_depth == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.pr_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.check_depth.outputs.reached_max_depth == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linters
        if: steps.check_depth.outputs.reached_max_depth == 'false'
        run: |
          pip install ruff black

      - name: Download failed job logs
        id: logs
        if: steps.check_depth.outputs.reached_max_depth == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run?.id
            });
            
            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            const lintJob = failedJobs.find(j => j.name.includes('Lint'));
            
            if (!lintJob) {
              core.info('No lint failures found');
              return { files: [], checkName: 'unknown' };
            }
            
            // Parse log to find failing files
            const logUrl = lintJob.url;
            const log = lintJob.steps.find(s => s.name.includes('ruff') || s.name.includes('black'));
            
            // Extract files from job name or use heuristic
            const checkName = lintJob.name.includes('black') ? 'black' : 'ruff';
            
            core.setOutput('check_name', checkName);
            core.setOutput('job_name', lintJob.name);
            
            return { checkName, jobName: lintJob.name };

      - name: Run black auto-format on all Python files
        id: black_fix
        if: >-
          steps.check_depth.outputs.reached_max_depth == 'false' &&
          steps.logs.outputs.check_name == 'black'
        run: |
          STRATEGY=${{ steps.check_depth.outputs.strategy }}
          echo "🔧 Running black auto-format (strategy: $STRATEGY)..."

          if [ "$STRATEGY" = "quick_fix" ]; then
            # Quick fix: standard black formatting
            black . --exclude '/(\.)'
          else
            # Deep fix: same as quick (black doesn't have aggressive mode)
            black . --exclude '/(\.)' --verbose
          fi

          # Check if anything changed
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No formatting changes needed"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --name-only > changed_files.txt
            echo "Files formatted:"
            cat changed_files.txt
          fi

      - name: Run ruff auto-fix
        id: ruff_fix
        if: >-
          steps.check_depth.outputs.reached_max_depth == 'false' &&
          steps.logs.outputs.check_name == 'ruff'
        run: |
          STRATEGY=${{ steps.check_depth.outputs.strategy }}
          echo "🔧 Running ruff auto-fix (strategy: $STRATEGY)..."

          if [ "$STRATEGY" = "quick_fix" ]; then
            # Quick fix: safe fixes only
            ruff check . --fix
          else
            # Deep fix: unsafe fixes enabled
            ruff check . --fix --unsafe-fixes --show-fixes
          fi

          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --name-only > changed_files.txt
          fi

      - name: Commit and push fixes
        id: commit
        if: >-
          steps.check_depth.outputs.reached_max_depth == 'false' &&
          (steps.black_fix.outputs.changed == 'true' || steps.ruff_fix.outputs.changed == 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DEPTH=${{ steps.pr.outputs.depth }}
          STRATEGY=${{ steps.check_depth.outputs.strategy }}
          CHECK_NAME=${{ steps.logs.outputs.check_name }}

          git add -A
          git commit -m "fix(auto): apply $CHECK_NAME fixes using $STRATEGY strategy [attempt: $((DEPTH + 1))/3]

          Auto-fixed by CI workflow after $CHECK_NAME check failure.
          PR: #${{ steps.pr.outputs.pr_number }}
          Strategy: $STRATEGY
          Attempt: $((DEPTH + 1))/3"

          git push origin ${{ steps.pr.outputs.pr_branch }}

          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Update branch depth marker for next attempt
        id: update_depth
        if: >-
          steps.check_depth.outputs.reached_max_depth == 'false' &&
          steps.commit.outputs.pushed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const depth = parseInt('${{ steps.pr.outputs.depth }}');
            const newDepth = depth + 1;
            const prNumber = '${{ steps.pr.outputs.pr_number }}';
            const prBranch = '${{ steps.pr.outputs.pr_branch }}';
            const checkName = '${{ steps.logs.outputs.check_name }}';

            // Update the PR branch name to include depth for next run
            // We'll use a git commit with the depth in metadata instead
            // This allows the workflow to track depth across attempts

            // Comment on PR about the attempt
            const strategyName = newDepth === 1 ? 'deeper fix' : 'owner input request';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `🔄 **Auto-fix attempt ${depth + 1}/3 did not resolve the issue**\n\n` +
                `The \`${checkName}\` check is still failing after the ${depth === 0 ? 'quick fix' : 'deep fix'} strategy.\n\n` +
                `Next step: Will try **${strategyName}** on the next CI run.\n\n` +
                `---\n` +
                `*Note: The fix workflow operates within this PR (no sub-PRs created).*`
            });

            // Create a temporary commit to increment the depth marker
            // The next workflow run will detect this and use the new depth
            const { data: refData } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${prBranch}`
            });

            const commitSha = refData.object.sha;
            const { data: commitData } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha
            });

            // Create an empty commit with depth marker
            const { data: newCommit } = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: `chore(auto-fix): increment depth to ${newDepth} for next attempt\n\n[auto-fix-depth-${newDepth}]`,
              tree: commitData.tree.sha,
              parents: [commitSha]
            });

            // Update the ref
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${prBranch}`,
              sha: newCommit.sha
            });

            core.info(`✅ Updated depth marker to ${newDepth} for next CI run`);
            return newDepth;

      - name: Create issue at max depth
        if: steps.check_depth.outputs.reached_max_depth == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.pr.outputs.pr_number }}';
            const checkName = '${{ steps.logs.outputs.check_name }}';
            const prTitle = '${{ steps.pr.outputs.pr_title }}';

            const title = `[${prTitle}] Manual fix required: ${checkName} check`;
            const body = `## ⚠️ Maximum Auto-Fix Attempts Reached\n\n` +
              `**PR:** #${prNumber}\n` +
              `**Failed Check:** \`${checkName}\`\n` +
              `**Fix Attempts:** 3/3 (maximum)\n\n` +
              `---\n\n` +
              `The automatic fix workflow has tried multiple strategies and reached the maximum number of attempts.\n\n` +
              `### Fix Strategies Attempted:\n` +
              `1. ✅ **Quick fix** - Standard auto-formatting/linting\n` +
              `2. ✅ **Deep fix** - Aggressive fixes with unsafe transformations\n` +
              `3. ⚠️ **Owner input required** - Manual intervention needed\n\n` +
              `**Manual intervention is now required** to resolve the remaining \`${checkName}\` failures.\n\n` +
              `### Next Steps:\n` +
              `1. Review the failing checks in the CI logs\n` +
              `2. Manually fix the issues locally\n` +
              `3. Push the fixes to the PR branch\n\n` +
              `### CI Workflow Run:\n` +
              `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['manual-fix-required', 'ci-failure', `pr-${prNumber}`]
            });

            // Comment on PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `⚠️ **Auto-fix workflow has exhausted all strategies.**\n\n` +
                `After 3 attempts using different fix strategies, the \`${checkName}\` check is still failing.\n\n` +
                `Created issue #${issue.number} for manual intervention.\n\n` +
                `### What was tried:\n` +
                `1. Quick fix (safe auto-formatting)\n` +
                `2. Deep fix (aggressive transformations)\n` +
                `3. This final notification\n\n` +
                `Please review the CI logs and fix the issues manually.`
            });

            core.info(`✅ Created issue #${issue.number}`);

      - name: Comment on PR with fix status
        if: >-
          steps.check_depth.outputs.reached_max_depth == 'false' &&
          steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const checkName = '${{ steps.logs.outputs.check_name }}';
            const prNumber = '${{ steps.pr.outputs.pr_number }}';
            const depth = '${{ steps.pr.outputs.depth }}';
            const strategy = '${{ steps.check_depth.outputs.strategy }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `✅ **Auto-fix applied** [attempt ${parseInt(depth) + 1}/3]\n\n` +
                `Applied automatic \`${checkName}\` fixes using **${strategy}** strategy and pushed to this PR.\n\n` +
                `The CI workflow will re-run to verify the fixes.\n\n` +
                `---\n` +
                `*Note: Fix attempts happen in-place within this PR (no sub-PRs created).*`
            });
