name: pre-commit

on:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit
      - name: Run pre-commit checks
        run: >
          pre-commit run
          --from-ref ${{ github.event.pull_request.base.sha }}
          --to-ref ${{ github.event.pull_request.head.sha }}
          --show-diff-on-failure

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const prTitle  = context.payload.pull_request.title;
            const prBranch = context.payload.pull_request.head.ref;
            const prAuthor = context.payload.pull_request.user.login;

            // GitHub issue titles are limited to 256 characters.
            const MAX_TITLE_LENGTH = 256;
            const titlePrefix = `[Pre-commit Failure] PR #${prNumber} — `;
            const remainingLength = MAX_TITLE_LENGTH - titlePrefix.length;
            let safePrTitle = prTitle;
            if (remainingLength > 0 && prTitle.length > remainingLength) {
              // Leave room for an ellipsis to indicate truncation.
              safePrTitle = prTitle.slice(0, Math.max(0, remainingLength - 1)) + '…';
            }
            const issueTitle = `${titlePrefix}${safePrTitle}`;

            // Paginate through all open issues to avoid missing existing tracking issues.
            let duplicate = null;
            for await (const response of github.paginate.iterator(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'open', per_page: 100 }
            )) {
              const found = response.data.find(i => i.title === issueTitle && !i.pull_request);
              if (found) {
                duplicate = found;
                break;
              }
            }
            if (!duplicate) {
              const issueBody = [
                `## Pre-commit Failure on PR #${prNumber}`,
                '',
                `**PR:** [${prTitle}](https://github.com/${owner}/${repo}/pull/${prNumber})`,
                `**Branch:** \`${prBranch}\``,
                `**Workflow run:** https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
                '',
                'One or more pre-commit hooks failed. Check the workflow run logs for details.',
                '',
                '---',
                `*Auto-created by pre-commit workflow. Close this issue once the failures are resolved.*`,
              ].join('\n');
              try {
                const { data: newIssue } = await github.rest.issues.create({
                  owner, repo,
                  title: issueTitle,
                  body: issueBody,
                });
                core.info(`Tracking issue created: ${newIssue.html_url}`);
                try {
                  await github.rest.issues.addAssignees({
                    owner,
                    repo,
                    issue_number: newIssue.number,
                    assignees: [prAuthor],
                  });
                } catch (assignErr) {
                  core.warning(`Could not assign tracking issue to ${prAuthor}: ${assignErr.message}`);
                }
              } catch (issueErr) {
                core.warning(`Could not create tracking issue: ${issueErr.message}`);
              }
            } else {
              core.info(`Tracking issue already exists: ${duplicate.html_url}`);
            }
