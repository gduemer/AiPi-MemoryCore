name: pre-commit

on:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit
      - name: Run pre-commit checks
        run: >
          pre-commit run
          --from-ref ${{ github.event.pull_request.base.sha }}
          --to-ref ${{ github.event.pull_request.head.sha }}
          --show-diff-on-failure

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const prTitle  = context.payload.pull_request.title;
            const prBranch = context.payload.pull_request.head.ref;
            const prAuthor = context.payload.pull_request.user.login;

            const issueTitle = `[Pre-commit Failure] PR #${prNumber} — ${prTitle}`;
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open',
            });
            const duplicate = existingIssues.find(i => i.title === issueTitle && !i.pull_request);
            if (!duplicate) {
              const issueBody = [
                `## Pre-commit Failure on PR #${prNumber}`,
                '',
                `**PR:** [${prTitle}](https://github.com/${owner}/${repo}/pull/${prNumber})`,
                `**Branch:** \`${prBranch}\``,
                `**Workflow run:** https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
                '',
                'One or more pre-commit hooks failed. Check the workflow run logs for details.',
                '',
                '---',
                `*Auto-created by pre-commit workflow. Close this issue once the failures are resolved.*`,
              ].join('\n');
              try {
                const { data: newIssue } = await github.rest.issues.create({
                  owner, repo,
                  title: issueTitle,
                  body: issueBody,
                  assignees: [prAuthor],
                });
                core.info(`Tracking issue created: ${newIssue.html_url}`);
              } catch (issueErr) {
                core.warning(`Could not create tracking issue: ${issueErr.message}`);
              }
            } else {
              core.info(`Tracking issue already exists: ${duplicate.html_url}`);
            }
